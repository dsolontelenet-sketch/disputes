
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Disputes File Generator</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect width='64' height='64' rx='12' fill='%230d0f14'/><circle cx='22' cy='32' r='14' fill='%23ff3b30'/><circle cx='42' cy='32' r='14' fill='%2300e676'/><path d='M22 24v16M14 32h16' stroke='white' stroke-width='3'/><path d='M36 32l4 4 8-8' stroke='white' stroke-width='3' fill='none'/></svg>">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;600&display=swap');

  :root {
    --bg: #0d0f14;
    --panel: #13161e;
    --border: #1f2535;
    --accent: #00d4ff;
    --text: #e2e8f0;
    --muted: #6b7a99;
    --success: #00e5a0;
    --danger: #ff4d4d;
    --wiki-bg: #0e1520;
    --wiki-border: #1a2a3a;
    --wiki-accent: #4db8ff;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 2rem;
  }

  .container { width: 100%; max-width: 660px; }

  .header { margin-bottom: 2rem; }
  .header h1 {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 1.1rem; font-weight: 600;
    color: var(--accent); letter-spacing: 0.08em;
    text-transform: uppercase; margin-bottom: 0.4rem;
  }
  .header p { font-size: 0.85rem; color: var(--muted); font-weight: 300; }

  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 2rem;
  }

  .field { margin-bottom: 1.5rem; }

  label {
    display: block; font-size: 0.75rem; font-weight: 600;
    letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--muted); margin-bottom: 0.5rem;
    font-family: 'IBM Plex Mono', monospace;
  }

  select, input[type="text"] {
    width: 100%; background: var(--bg);
    border: 1px solid var(--border); border-radius: 8px;
    padding: 0.75rem 1rem; color: var(--text);
    font-family: 'IBM Plex Mono', monospace; font-size: 0.88rem;
    outline: none; transition: border-color 0.2s; appearance: none;
  }
  select:focus, input[type="text"]:focus { border-color: var(--accent); }
  select option { background: #1a1d28; }

  .priority-group { display: none; gap: 0.5rem; flex-wrap: wrap; margin-top: 0.5rem; }
  .priority-group.visible { display: flex; }

  .priority-btn {
    flex: 1; min-width: 80px; padding: 0.6rem;
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 6px; color: var(--muted);
    font-family: 'IBM Plex Mono', monospace; font-size: 0.8rem;
    cursor: pointer; transition: all 0.15s; text-align: center;
  }
  .priority-btn:hover { border-color: var(--accent); color: var(--accent); }
  .priority-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(0,212,255,0.08); }

  /* ── URL SECTION ── */
  .url-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 0.75rem;
  }
  .url-header label { margin-bottom: 0; }

  .url-badge {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.7rem; color: var(--accent);
    background: rgba(0,212,255,0.1);
    border: 1px solid rgba(0,212,255,0.2);
    border-radius: 20px; padding: 0.15rem 0.65rem;
  }

  .mode-toggle { display: flex; gap: 0.4rem; margin-bottom: 1rem; }
  .mode-btn {
    padding: 0.4rem 0.9rem;
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 6px; color: var(--muted);
    font-family: 'IBM Plex Mono', monospace; font-size: 0.74rem;
    cursor: pointer; transition: all 0.15s;
  }
  .mode-btn:hover { border-color: var(--accent); color: var(--accent); }
  .mode-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(0,212,255,0.08); }

  .url-rows { display: flex; flex-direction: column; gap: 0.45rem; }
  .url-row { display: flex; align-items: center; gap: 0.5rem; }
  .url-num {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.68rem; color: var(--muted);
    min-width: 18px; text-align: right; flex-shrink: 0;
  }
  .url-row input { flex: 1; padding: 0.55rem 0.85rem; font-size: 0.82rem; }
  .url-del {
    width: 28px; height: 28px; flex-shrink: 0;
    background: transparent; border: 1px solid var(--border);
    border-radius: 6px; color: var(--muted);
    cursor: pointer; font-size: 0.8rem;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .url-del:hover { border-color: var(--danger); color: var(--danger); background: rgba(255,77,77,0.08); }

  .url-add {
    margin-top: 0.5rem; padding: 0.5rem;
    background: transparent; border: 1px dashed var(--border);
    border-radius: 8px; color: var(--muted);
    font-family: 'IBM Plex Mono', monospace; font-size: 0.76rem;
    cursor: pointer; width: 100%; transition: all 0.15s; text-align: center;
  }
  .url-add:hover { border-color: var(--accent); color: var(--accent); border-style: solid; }

  #bulk-ta {
    width: 100%; min-height: 130px;
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 8px; padding: 0.75rem 1rem;
    color: var(--text); font-family: 'IBM Plex Mono', monospace;
    font-size: 0.82rem; outline: none; resize: vertical;
    transition: border-color 0.2s; line-height: 1.7;
  }
  #bulk-ta:focus { border-color: var(--accent); }
  #bulk-ta::placeholder { color: var(--muted); }

  .preview-box {
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 8px; padding: 1rem; margin-top: 1.5rem;
  }
  .preview-box .lbl {
    font-size: 0.7rem; font-family: 'IBM Plex Mono', monospace;
    color: var(--muted); text-transform: uppercase;
    letter-spacing: 0.1em; margin-bottom: 0.4rem;
  }
  .preview-fn {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.85rem; color: var(--success); word-break: break-all;
  }
  .preview-sub {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.7rem; color: var(--muted); margin-top: 0.4rem;
  }

  .btn-generate {
    width: 100%; margin-top: 1.5rem; padding: 1rem;
    background: var(--accent); border: none; border-radius: 8px;
    color: #0d0f14; font-family: 'IBM Plex Mono', monospace;
    font-weight: 600; font-size: 0.9rem; letter-spacing: 0.05em;
    cursor: pointer; transition: all 0.2s;
  }
  .btn-generate:hover { background: #33dcff; transform: translateY(-1px); }
  .btn-generate:active { transform: translateY(0); }
  .btn-generate:disabled { background: var(--border); color: var(--muted); cursor: not-allowed; transform: none; }

  .hint { font-size: 0.74rem; color: var(--muted); margin-top: 0.3rem; }
  .divider { border: none; border-top: 1px solid var(--border); margin: 1.5rem 0; }

  /* ── WIKI MESSAGE SECTION ── */
  .wiki-section {
    margin-top: 1.5rem;
    border: 1px solid var(--wiki-border);
    border-radius: 10px;
    overflow: hidden;
    display: none;
  }
  .wiki-section.visible { display: block; }

  .wiki-header {
    display: flex; align-items: center; justify-content: space-between;
    background: rgba(77,184,255,0.06);
    padding: 0.75rem 1rem;
    border-bottom: 1px solid var(--wiki-border);
  }
  .wiki-title {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.72rem; font-weight: 600;
    color: var(--wiki-accent); text-transform: uppercase;
    letter-spacing: 0.1em; display: flex; align-items: center; gap: 0.5rem;
  }
  .wiki-badge {
    font-size: 0.65rem;
    background: rgba(77,184,255,0.15);
    border: 1px solid rgba(77,184,255,0.3);
    border-radius: 20px; padding: 0.1rem 0.5rem;
    color: var(--wiki-accent);
  }

  .copy-btn {
    background: transparent;
    border: 1px solid var(--wiki-border);
    border-radius: 6px;
    padding: 0.3rem 0.75rem;
    color: var(--muted);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.72rem;
    cursor: pointer;
    transition: all 0.15s;
    display: flex; align-items: center; gap: 0.35rem;
  }
  .copy-btn:hover { border-color: var(--wiki-accent); color: var(--wiki-accent); }
  .copy-btn.copied { border-color: var(--success); color: var(--success); }

  .wiki-body {
    background: var(--wiki-bg);
    padding: 1.1rem 1.25rem;
  }

  .wiki-message {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.8rem;
    line-height: 1.85;
    color: var(--text);
    white-space: pre-wrap;
    word-break: break-word;
  }

  .wiki-message .hl-ts   { color: #ffd166; }
  .wiki-message .hl-num  { color: var(--success); }
  .wiki-message .hl-key  { color: var(--wiki-accent); }
  .wiki-message .hl-jp   { color: #c084fc; }
  .wiki-message .hl-none { color: var(--muted); }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>Disputes File Generator</h1>
    <p>Generate formatted Excel dispute files with correct filenames</p>
  </div>

  <div class="card">

    <!-- Vendor -->
    <div class="field">
      <label>Vendor</label>
      <select id="vendor" onchange="onVendorChange()">
        <option value="">— Select vendor —</option>
        <option value="barracuda">Barracuda</option>
        <option value="zo">ZO</option>
        <option value="az">AZ</option>
        <option value="checkpoint">Checkpoint</option>
        <option value="microsoft">Microsoft</option>
        <option value="os">OS</option>
        <option value="is">IS</option>
        <option value="tw">TW</option>
      </select>
    </div>

    <!-- Priority -->
    <div class="field" id="priorityField" style="display:none;">
      <label>Priority</label>
      <div class="priority-group visible">
        <button class="priority-btn active" data-p="1" onclick="selectPriority(this)">Priority 1</button>
        <button class="priority-btn" data-p="2" onclick="selectPriority(this)">Priority 2</button>
        <button class="priority-btn" data-p="3" id="p3btn" onclick="selectPriority(this)">Priority 3</button>
      </div>
    </div>

    <hr class="divider">

    <!-- Accepted -->
    <div class="field">
      <label>Accepted Timestamp</label>
      <input type="text" id="accepted" placeholder="e.g. 20260226T070001" oninput="updatePreview()" />
      <p class="hint">Format: YYYYMMDDTHHMMSS</p>
    </div>

    <!-- URLs -->
    <div class="field">
      <div class="url-header">
        <label>URLs</label>
        <span class="url-badge" id="url-badge">0 URLs</span>
      </div>

      <div class="mode-toggle">
        <button class="mode-btn active" id="btn-single" onclick="setMode('single')">➕ One by One</button>
        <button class="mode-btn" id="btn-bulk" onclick="setMode('bulk')">📋 Paste Bulk</button>
      </div>

      <!-- Single mode -->
      <div id="single-mode">
        <div class="url-rows" id="url-rows"></div>
        <button class="url-add" onclick="addRow()">＋ Add another URL</button>
      </div>

      <!-- Bulk mode -->
      <div id="bulk-mode" style="display:none;">
        <textarea id="bulk-ta"
          placeholder="Paste URLs here — one per line:&#10;&#10;google.com&#10;facebook.com&#10;example.org&#10;malicious-site.net&#10;..."
          oninput="updatePreview()"></textarea>
        <p class="hint" style="margin-top:0.4rem;">One URL per line • Empty lines are ignored</p>
      </div>
    </div>

    <!-- Preview -->
    <div class="preview-box">
      <div class="lbl">Filename Preview</div>
      <div class="preview-fn" id="preview-fn">—</div>
      <div class="preview-sub" id="preview-sub"></div>
    </div>

    <button class="btn-generate" id="genBtn" onclick="generate()" disabled>Generate &amp; Download</button>

    <!-- ── WIKI MESSAGE (Checkpoint only) ── -->
    <div class="wiki-section" id="wiki-section">
      <div class="wiki-header">
        <div class="wiki-title">
          📋 Wiki Message
          <span class="wiki-badge">Checkpoint only</span>
        </div>
        <button class="copy-btn" id="copy-btn" onclick="copyWiki()">
          <span id="copy-icon">⎘</span>
          <span id="copy-label">Copy</span>
        </button>
      </div>
      <div class="wiki-body">
        <div class="wiki-message" id="wiki-message">—</div>
      </div>
    </div>

  </div>
</div>

<script>
let selectedPriority = 1;
let mode = 'single';

window.addEventListener('DOMContentLoaded', () => addRow());

// ── VENDOR ──
function onVendorChange() {
  const v = document.getElementById('vendor').value;
  document.getElementById('priorityField').style.display = ['microsoft','os'].includes(v) ? 'block' : 'none';
  document.getElementById('p3btn').style.display = v === 'microsoft' ? '' : 'none';
  if (v === 'os') {
    document.querySelectorAll('.priority-btn').forEach(b => b.classList.remove('active'));
    document.querySelector('[data-p="2"]').classList.add('active');
    selectedPriority = 2;
  }
  updatePreview();
}

function selectPriority(btn) {
  document.querySelectorAll('.priority-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  selectedPriority = parseInt(btn.dataset.p);
  updatePreview();
}

// ── MODE ──
function setMode(m) {
  mode = m;
  document.getElementById('single-mode').style.display = m === 'single' ? 'block' : 'none';
  document.getElementById('bulk-mode').style.display   = m === 'bulk'   ? 'block' : 'none';
  document.getElementById('btn-single').classList.toggle('active', m === 'single');
  document.getElementById('btn-bulk').classList.toggle('active', m === 'bulk');
  updatePreview();
}

// ── URL ROWS ──
function addRow() {
  const wrap = document.getElementById('url-rows');
  const idx  = wrap.children.length + 1;
  const row  = document.createElement('div');
  row.className = 'url-row';
  row.innerHTML = `
    <span class="url-num">${idx}</span>
    <input type="text" placeholder="e.g. google.com" oninput="updatePreview()" />
    <button class="url-del" onclick="delRow(this)" title="Remove">✕</button>
  `;
  wrap.appendChild(row);
  reindex();
  updatePreview();
  row.querySelector('input').focus();
}

function delRow(btn) {
  const wrap = document.getElementById('url-rows');
  const row  = btn.closest('.url-row');
  if (wrap.children.length <= 1) {
    row.querySelector('input').value = '';
    updatePreview();
    return;
  }
  row.remove();
  reindex();
  updatePreview();
}

function reindex() {
  document.querySelectorAll('#url-rows .url-row').forEach((r, i) => {
    r.querySelector('.url-num').textContent = i + 1;
  });
}

// ── HELPERS ──
function cleanUrl(url) {
  return url
    .trim()
    .replace(/^https?:\/\//i, '')
    .replace(/:(\d+)(\/.*)?$/, '$2')
    .trim();
}

function getUrls() {
  if (mode === 'bulk') {
    return document.getElementById('bulk-ta').value
      .split('\n').map(l => cleanUrl(l)).filter(l => l);
  }
  return Array.from(document.querySelectorAll('#url-rows input'))
    .map(i => cleanUrl(i.value)).filter(v => v);
}

function pad(n) {
  return String(n).padStart(2, '0');
}

// ── FILENAME ──
function getFilename() {
  const v   = document.getElementById('vendor').value;
  const acc = document.getElementById('accepted').value.trim();
  if (!v || !acc) return null;
  if (v === 'barracuda')  return `Disputes Priority 1 Barracuda accepted at ${acc}`;
  if (v === 'zo')         return `Disputes Priority 1 ZO accepted at ${acc}`;
  if (v === 'az')         return `Disputes Priority 1 AZ accepted at ${acc}`;
  if (v === 'checkpoint') return `Disputes Priority 1 Checkpoint ${acc} Diovic`;
  if (v === 'os')         return `Disputes Priority 2 OS accepted at ${acc}`;
  if (v === 'is')         return `Disputes Priority 1 IS accepted at ${acc}`;
  if (v === 'tw')         return `Disputes Priority 1 TW accepted at ${acc}`;
  if (v === 'microsoft') {
    return selectedPriority === 1
      ? `Disputes Priority 1 Microsoft ${acc}`
      : `Disputes Priority ${selectedPriority} Microsoft accepted at ${acc}`;
  }
  return null;
}

// ── WIKI MESSAGE ──
function buildWikiText(acc, count) {
  const c = pad(count);
  const fraction = `${c}/${c}`;
  return `Hi Chisato-san,\n\nDone uploading/updating on GD the data from disputes CP P1 2026 file (${c} URL). Thank you.\n\n[Mail] Disputes priority 1 accepted ${acc} UTC \nTotal: ${c} URL \nCategorized:${fraction} \nUploaded on GD: ${fraction}\nComment: Disputes Priority 1 Checkpoint ${acc}\n\n「The same category as the secondary」None \n「The URL already has the same categories with the same order」None \n「Tagged as Immutable」None \n「Security category」None`;
}

function renderWiki(acc, count) {
  const c = pad(count);
  const fraction = `${c}/${c}`;
  const el = document.getElementById('wiki-message');

  el.innerHTML =
    `Hi Chisato-san,\n\n` +
    `Done uploading/updating on GD the data from disputes CP P1 2026 file (<span class="hl-num">${c} URL</span>). Thank you.\n\n` +
    `[Mail] Disputes priority 1 accepted <span class="hl-ts">${acc}</span> UTC \n` +
    `Total: <span class="hl-num">${c} URL</span> \n`+
	`Categorized:<span class="hl-num">${fraction}</span> \n` +
    `Uploaded on GD: <span class="hl-num">${fraction}</span>\n` +
    `Comment: Disputes Priority 1 Checkpoint <span class="hl-ts">${acc}</span>\n\n` +
    `<span class="hl-jp">「The same category as the secondary」</span><span class="hl-none">None</span> \n` +
    `<span class="hl-jp">「The URL already has the same categories with the same order」</span><span class="hl-none">None</span> \n` +
    `<span class="hl-jp">「Tagged as Immutable」</span><span class="hl-none">None</span> \n` +
    `<span class="hl-jp">「Security category」</span><span class="hl-none">None</span>`;
}

// ── PREVIEW ──
function updatePreview() {
  const fn   = getFilename();
  const urls = getUrls();
  const v    = document.getElementById('vendor').value;
  const acc  = document.getElementById('accepted').value.trim();

  document.getElementById('url-badge').textContent = urls.length + (urls.length === 1 ? ' URL' : ' URLs');

  const previewFn  = document.getElementById('preview-fn');
  const previewSub = document.getElementById('preview-sub');
  const btn        = document.getElementById('genBtn');
  const wikiSec    = document.getElementById('wiki-section');

  if (fn) {
    previewFn.textContent  = fn + '.xlsx';
    previewSub.textContent = urls.length > 0
      ? `✓ ${urls.length} row${urls.length > 1 ? 's' : ''} will be written to the Excel file`
      : 'No URLs entered yet';
    btn.disabled = urls.length === 0;
  } else {
    previewFn.textContent  = '—';
    previewSub.textContent = '';
    btn.disabled = true;
  }

  // Wiki section — only for Checkpoint
  if (v === 'checkpoint' && acc && urls.length > 0) {
    wikiSec.classList.add('visible');
    renderWiki(acc, urls.length);
  } else {
    wikiSec.classList.remove('visible');
  }
}

// ── COPY WIKI ──
function copyWiki() {
  const v    = document.getElementById('vendor').value;
  const acc  = document.getElementById('accepted').value.trim();
  const urls = getUrls();
  if (v !== 'checkpoint' || !acc || !urls.length) return;

  const text = buildWikiText(acc, urls.length);
  navigator.clipboard.writeText(text).then(() => {
    const btn   = document.getElementById('copy-btn');
    const icon  = document.getElementById('copy-icon');
    const label = document.getElementById('copy-label');
    btn.classList.add('copied');
    icon.textContent  = '✓';
    label.textContent = 'Copied!';
    setTimeout(() => {
      btn.classList.remove('copied');
      icon.textContent  = '⎘';
      label.textContent = 'Copy';
    }, 2000);
  });
}

// ── GENERATE ──
function generate() {
  const fn   = getFilename();
  const urls = getUrls();
  if (!fn || !urls.length) return;

  const wb = XLSX.utils.book_new();

  const wsData = urls.map(url => [
    url,
    null,
    null,
    99999,
    'Immutable',
    'UCReviewed,CLReviewed,CLRetain,HTTPError,IWCC,InTheClear,Uncategorized,UnknownHost,Undeliverable,Deleted,StDnsError,NRD,DLCSkip'
  ]);

  const ws = XLSX.utils.aoa_to_sheet(wsData);
  ws['!cols'] = [{ wch: 34 }, { wch: 10 }, { wch: 10 }, { wch: 10 }, { wch: 12 }, { wch: 80 }];

  XLSX.utils.book_append_sheet(wb, ws, 'Sheet1');
  XLSX.writeFile(wb, fn + '.xlsx');
}
</script>
</body>
</html>
